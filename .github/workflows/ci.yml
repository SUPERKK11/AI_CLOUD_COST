name: Cloud Cost Detective CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Docker Containers
    runs-on: ubuntu-latest

    steps:
      # Step 1: Grab the code from the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker inside the GitHub runner
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Test the Backend Build
      - name: Build Backend Image
        run: docker build -t cost-detective-backend ./backend

      # Step 4: Test the Frontend Build
      - name: Build Frontend Image
        run: docker build -t cost-detective-frontend ./frontend